<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savr — Expense Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0F0F; color: #fff;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .logo { font-size: 72px; font-weight: 900; color: #6C63FF; letter-spacing: -4px; margin-bottom: 8px; }
    .tagline { color: #888; font-size: 18px; margin-bottom: 16px; }
    .badge {
      background: #6C63FF22; color: #6C63FF;
      border: 1px solid #6C63FF44; border-radius: 20px;
      padding: 6px 16px; font-size: 13px; font-weight: 600;
      margin-bottom: 48px;
    }
    .features {
      display: flex; flex-wrap: wrap; gap: 12px;
      justify-content: center; max-width: 600px; margin-bottom: 48px;
    }
    .feature {
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 12px; padding: 12px 16px;
      font-size: 14px; color: #ccc;
      display: flex; align-items: center; gap: 8px;
    }
    .links { display: flex; gap: 16px; margin-bottom: 48px; flex-wrap: wrap; justify-content: center; }
    .link {
      color: #6C63FF; font-size: 14px; text-decoration: none;
      padding: 10px 20px; border: 1px solid #6C63FF44;
      border-radius: 10px; transition: background 0.2s;
    }
    .link:hover { background: #6C63FF22; }
    .footer { color: #444; font-size: 13px; text-align: center; line-height: 2; }
  </style>
</head>
<body>
  <div class="logo">Savr</div>
  <p class="tagline">Spend smart, save more</p>
  <div class="badge">📱 Available on Android</div>

  <div class="features">
    <div class="feature">💰 Track Expenses</div>
    <div class="feature">📊 Smart Reports</div>
    <div class="feature">🎯 Set Budgets</div>
    <div class="feature">🔄 Recurring Expenses</div>
    <div class="feature">📤 CSV Export</div>
    <div class="feature">☁️ Cloud Sync</div>
    <div class="feature">📵 Works Offline</div>
    <div class="feature">🌍 30 Currencies</div>
  </div>

  <div class="links">
    <a class="link" href="privacy-policy.html">Privacy Policy</a>
    <a class="link" href="terms-of-service.html">Terms of Service</a>
  </div>

  <div class="footer">
    <p>© 2026 Savr · Developed by Mwnswrang Wary</p>
    <p>Contact: <a href="mailto:007mwnswrangwary@gmail.com" style="color:#6C63FF">007mwnswrangwary@gmail.com</a></p>
  </div>
</body>
</html>
