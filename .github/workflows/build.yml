name: Build APK and AAB
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK and CMake
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.31.1"
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('package.json', 'package-lock.json') }}
          restore-keys: |
            gradle-
      - name: Prebuild
        run: npx expo prebuild --platform android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export --platform android --output-dir dist
          cp dist/_expo/static/js/android/*.hbc android/app/src/main/assets/index.android.bundle 2>/dev/null || cp dist/_expo/static/js/android/*.js android/app/src/main/assets/index.android.bundle
          cp assets/adi-registration.properties android/app/src/main/assets/adi-registration.properties
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/savr.keystore
      - name: Build signed APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/savr.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Build signed AAB
        run: |
          cd android && ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/savr.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: savr-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 1
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: savr-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 1
